{% extends "base.html" %}
{% block title %}Đăng nhập{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="text-center mb-4"><i class="bi bi-box-arrow-in-right"></i> Đăng nhập</h4>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" placeholder="email@example.com" required>
                        </div>
                        <button class="btn btn-accent w-100"><i class="bi bi-box-arrow-in-right"></i> Đăng nhập</button>
                    </form>
                    <hr>
                    <p class="text-center mb-0">
                        Chưa có tài khoản? <a href="{% url 'register' %}">Đăng ký ngay</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
