{% extends "base.html" %}
{% block title %}Đăng ký{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h4 class="text-center mb-4"><i class="bi bi-person-plus"></i> Đăng ký tài khoản</h4>
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Họ tên <span class="text-danger">*</span></label>
                            <input type="text" name="name" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email <span class="text-danger">*</span></label>
                            <input type="email" name="email" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input type="text" name="phone" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Địa chỉ</label>
                            <textarea name="address" class="form-control" rows="2"></textarea>
                        </div>
                        <button class="btn btn-accent w-100"><i class="bi bi-check-lg"></i> Đăng ký</button>
                    </form>
                    <hr>
                    <p class="text-center mb-0">
                        Đã có tài khoản? <a href="{% url 'login' %}">Đăng nhập</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
